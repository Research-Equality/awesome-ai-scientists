      </text>
      <text x="24" y="64" fill="#9FB6D2" font-family="Inter, Segoe UI, sans-serif" font-size="15">
        • Distinguish systems from infrastructure and modules
      </text>
      <text x="24" y="90" fill="#9FB6D2" font-family="Inter, Segoe UI, sans-serif" font-size="15">
        • Map resources onto the actual research workflow
      </text>
      <text x="24" y="116" fill="#9FB6D2" font-family="Inter, Segoe UI, sans-serif" font-size="15">
        • Stay curated, opinionated, and maintainable over time
      </text>
    </g>
  </g>

  <g filter="url(#shadow)" transform="translate(918 58)">
    <rect width="588" height="344" rx="28" fill="#07111F" fill-opacity="0.78" stroke="url(#cardStroke)"/>

