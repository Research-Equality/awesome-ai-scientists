<svg width="1600" height="460" viewBox="0 0 1600 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1520" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0A172A"/>
      <stop offset="1" stop-color="#101B31"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 120) rotate(90) scale(210 280)">
      <stop stop-color="#22D3EE" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 340) rotate(90) scale(180 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#A5B4FC" stroke-opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="cardStroke" x1="940" y1="44" x2="1460" y2="388" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="460" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="460" rx="28" fill="url(#grid)"/>
  <rect width="1600" height="460" rx="28" stroke="#7DD3FC" stroke-opacity="0.14"/>
  <ellipse cx="1320" cy="120" rx="280" ry="210" fill="url(#glowA)"/>
  <ellipse cx="1120" cy="340" rx="260" ry="180" fill="url(#glowB)"/>

  <g opacity="0.82">
    <circle cx="84" cy="84" r="3" fill="#38BDF8"/>
    <circle cx="112" cy="84" r="3" fill="#F59E0B"/>
    <circle cx="140" cy="84" r="3" fill="#22C55E"/>
  </g>

  <g transform="translate(86 118)">
    <text x="0" y="0" fill="#E5F3FF" font-family="Inter, Segoe UI, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.2">
