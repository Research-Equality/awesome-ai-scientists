    </text>
    <text x="0" y="52" fill="#8FB3D9" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="500">
      A curated, layered map of AI-native research systems
    </text>
    <text x="0" y="96" fill="#AFC8E6" font-family="Inter, Segoe UI, sans-serif" font-size="18">
      Systems • Platforms • Workflow Modules • Benchmarks • Surveys • Datasets • Meta-resources
    </text>

    <g transform="translate(0 134)">
      <rect width="232" height="42" rx="21" fill="url(#pill)"/>
      <text x="24" y="27" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">
        Layered research ecosystem
      </text>
    </g>

    <g transform="translate(252 134)">
      <rect width="184" height="42" rx="21" fill="#0F172A" stroke="#334155"/>
      <text x="22" y="27" fill="#CBD5E1" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="600">
        Workflow-aware curation
      </text>
    </g>

    <g transform="translate(0 206)">
      <rect width="540" height="118" rx="18" fill="#081222" fill-opacity="0.72" stroke="#1E293B"/>
      <text x="24" y="34" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">
