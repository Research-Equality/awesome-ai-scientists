    <g transform="translate(54 122)">
      <path d="M0 28H70" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.45"/>
      <path d="M0 92H70" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.45"/>
      <path d="M0 156H70" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.45"/>

      <rect x="70" y="0" width="448" height="56" rx="16" fill="#0E1729" stroke="#243B53"/>
      <text x="92" y="23" fill="#67E8F9" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">
        LAYER 2
      </text>
      <text x="92" y="40" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">
        Research Infrastructure &amp; Platforms
      </text>

      <rect x="70" y="64" width="448" height="56" rx="16" fill="#0E1729" stroke="#243B53"/>
      <text x="92" y="87" fill="#FBBF24" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">
        LAYER 3
      </text>
      <text x="92" y="104" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">
        Workflow Modules
      </text>

      <rect x="70" y="128" width="448" height="56" rx="16" fill="#0E1729" stroke="#243B53"/>
      <text x="92" y="151" fill="#A78BFA" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">
        LAYER 4
      </text>
      <text x="92" y="168" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">
        Benchmarks, Surveys &amp; Meta-Resources
      </text>
    </g>

    <g transform="translate(420 262)">
      <rect width="116" height="40" rx="20" fill="#082032" stroke="#0EA5E9" stroke-opacity="0.4"/>
      <text x="21" y="25" fill="#BAE6FD" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600">
